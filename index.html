<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMART AI BARCODE SYSTEM</title>

<link rel="icon"
href="https://upload.wikimedia.org/wikipedia/en/thumb/7/70/Kimetsu_no_Yaiba_logo.svg/320px-Kimetsu_no_Yaiba_logo.svg.png">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
overflow-x:hidden;

background:
radial-gradient(circle at top left,#22c55e22 0%,transparent 25%),
radial-gradient(circle at bottom right,#06b6d422 0%,transparent 25%),
linear-gradient(135deg,#020617,#07111f,#0f172a);

color:white;
}

/* BACKGROUND */

.bg1,.bg2,.bg3{
position:fixed;
border-radius:50%;
filter:blur(130px);
z-index:-1;
animation:float 10s ease-in-out infinite;
}

.bg1{
width:280px;
height:280px;
background:#22c55e;
top:-100px;
left:-100px;
opacity:.15;
}

.bg2{
width:280px;
height:280px;
background:#06b6d4;
bottom:-100px;
right:-100px;
opacity:.15;
animation-delay:2s;
}

.bg3{
width:220px;
height:220px;
background:#9333ea;
top:40%;
left:40%;
opacity:.08;
animation-delay:4s;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(15px);}
100%{transform:translateY(0px);}
}

.page{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:16px;
transition:.5s;
}

.container{
width:100%;
max-width:1000px;
}

.glass{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(18px);
box-shadow:0 10px 40px rgba(0,0,0,.35);
}

.welcome-box{
padding:40px 28px;
border-radius:28px;
text-align:center;
}

.logo-circle{
width:82px;
height:82px;
border-radius:24px;
margin:auto auto 18px;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
background:linear-gradient(135deg,#22c55e,#06b6d4);
}

.welcome-title{
font-size:38px;
font-weight:800;
line-height:1.1;
margin-bottom:16px;

background:linear-gradient(to right,#22c55e,#38bdf8,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.welcome-sub{
max-width:600px;
margin:auto;
line-height:1.8;
color:#cbd5e1;
font-size:14px;
margin-bottom:26px;
}

.enter-btn{
border:none;
padding:13px 28px;
border-radius:50px;
font-size:14px;
font-weight:700;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#22c55e,#06b6d4);
}

#appPage{
display:none;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
border-radius:20px;
margin-bottom:16px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand-icon{
width:50px;
height:50px;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
background:linear-gradient(135deg,#22c55e,#06b6d4);
}

.stats{
display:flex;
gap:12px;
margin-bottom:16px;
flex-wrap:wrap;
}

.stat-box{
flex:1;
min-width:150px;
padding:16px;
border-radius:18px;
}

.stat-label{
font-size:11px;
color:#94a3b8;
margin-bottom:6px;
}

.stat-value{
font-size:22px;
font-weight:700;
}

.main-grid{
display:grid;
grid-template-columns:280px 1fr;
gap:16px;
}

.search-card,
.result-card{
padding:18px;
border-radius:20px;
}

.section-title{
font-size:18px;
font-weight:700;
margin-bottom:14px;
}

.input-box{
width:100%;
padding:13px 14px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.05);
color:white;
font-size:13px;
margin-bottom:10px;
}

.input-box::placeholder{
color:#94a3b8;
}

.btn{
width:100%;
border:none;
padding:13px;
border-radius:14px;
font-size:13px;
font-weight:700;
color:white;
cursor:pointer;
margin-bottom:10px;
}

.search-btn{
background:linear-gradient(135deg,#22c55e,#06b6d4);
}

.scan-btn{
background:linear-gradient(135deg,#8b5cf6,#ec4899);
}

.voice-btn{
background:linear-gradient(135deg,#f59e0b,#ef4444);
}

.ai-loading{
display:flex;
align-items:center;
gap:8px;
margin-top:12px;
color:#38bdf8;
font-size:12px;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:#38bdf8;
animation:bounce 1s infinite;
}

.dot:nth-child(2){
animation-delay:.2s;
}

.dot:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{
0%,80%,100%{
transform:scale(0);
}
40%{
transform:scale(1);
}
}

#reader{
margin-top:14px;
overflow:hidden;
border-radius:18px;
}

.result-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.data-box{
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.04);
}

.data-label{
font-size:11px;
color:#38bdf8;
margin-bottom:6px;
}

.data-value{
font-size:13px;
font-weight:600;
word-break:break-word;
}

@media(max-width:850px){

.main-grid{
grid-template-columns:1fr;
}

.result-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<!-- WELCOME -->

<div class="page" id="welcomePage">

<div class="container">

<div class="welcome-box glass">

<div class="logo-circle">
🤖
</div>

<h1 class="welcome-title">
SMART AI<br>
BARCODE SYSTEM
</h1>

<p class="welcome-sub">

✔ Barcode Scanner AI <br>
✔ Voice Assistant <br>
✔ Database Excel <br>
✔ AI Sound Effects <br>
✔ Premium Dashboard

</p>

<button class="enter-btn" onclick="openApp()">
🚀 Aplikasi System Barcode
</button>

</div>

</div>

</div>

<!-- APP -->

<div class="page" id="appPage">

<div class="container">

<div class="topbar glass">

<div class="brand">

<div class="brand-icon">
🤖
</div>

<div>
<h2>SMART AI BARCODE</h2>
<p>Sistem Pengecekan Barang</p>
</div>

</div>

</div>

<div class="stats">

<div class="stat-box glass">
<div class="stat-label">
TOTAL DATABASE
</div>
<div class="stat-value" id="dbCount">
0
</div>
</div>

<div class="stat-box glass">
<div class="stat-label">
TOTAL SEARCH
</div>
<div class="stat-value" id="searchCount">
0
</div>
</div>

<div class="stat-box glass">
<div class="stat-label">
AI STATUS
</div>
<div class="stat-value">
ONLINE
</div>
</div>

</div>

<div class="main-grid">

<!-- LEFT -->

<div class="search-card glass">

<h2 class="section-title">
🔍 AI Scanner
</h2>

<input
type="text"
id="searchInput"
class="input-box"
placeholder="Masukkan Barcode / PLU..."
>

<button class="btn search-btn" onclick="searchPLU()">
Cari Data
</button>

<button class="btn scan-btn" onclick="startScanner()">
📷 Scan Barcode
</button>

<button class="btn voice-btn" onclick="startVoiceInput()">
🎙 Voice Search
</button>

<div class="ai-loading">

<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>

AI READY

</div>

<div id="reader"></div>

</div>

<!-- RIGHT -->

<div class="result-card glass">

<h2 class="section-title">
📄 Detail Barang
</h2>

<div class="result-grid" id="result">

<div class="data-box">

<div class="data-label">
STATUS
</div>

<div class="data-value">
Menunggu pencarian...
</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

/* SOUND */

const sounds = {

open:new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"),

success:new Audio("https://assets.mixkit.co/active_storage/sfx/2206/2206-preview.mp3"),

scan:new Audio("https://assets.mixkit.co/active_storage/sfx/2185/2185-preview.mp3"),

error:new Audio("https://assets.mixkit.co/active_storage/sfx/2220/2220-preview.mp3")

};

function playSound(type){

if(sounds[type]){

sounds[type].currentTime = 0;

sounds[type].play();

}

}

/* SPEAK */

function speak(text){

window.speechSynthesis.cancel();

const speech =
new SpeechSynthesisUtterance(text);

speech.lang = "id-ID";

window.speechSynthesis.speak(speech);

}

/* OPEN APP */

function openApp(){

playSound("open");

document.getElementById("welcomePage").style.display =
"none";

document.getElementById("appPage").style.display =
"flex";

}

/* DATABASE */

let dataExcel = [];

let totalSearch = 0;

const excelURL = "barcode.xlsx";

fetch(excelURL)

.then(response => response.arrayBuffer())

.then(data => {

const workbook = XLSX.read(data,{
type:"array"
});

const sheetName = workbook.SheetNames[0];

const sheet = workbook.Sheets[sheetName];

dataExcel = XLSX.utils.sheet_to_json(sheet,{
raw:true,
defval:""
});

document.getElementById("dbCount").innerText =
dataExcel.length;

})

.catch(err => {

playSound("error");

});

/* RESULT BOX */

function createBox(label,value){

return `

<div class="data-box">

<div class="data-label">
${label}
</div>

<div class="data-value">
${value || '-'}
</div>

</div>

`;

}

/* FORMAT TANGGAL */

function formatTanggal(excelDate){

if(
excelDate === null ||
excelDate === undefined ||
excelDate === "" ||
excelDate === 0
){
return "-";
}

if(!isNaN(excelDate)){

const date =
new Date(
Math.round((excelDate - 25569) * 86400 * 1000)
);

if(isNaN(date.getTime())){
return "-";
}

return date.toLocaleDateString(
'en-GB',
{
day:'2-digit',
month:'short',
year:'2-digit'
}
);

}

const date = new Date(excelDate);

if(isNaN(date.getTime())){
return excelDate;
}

return date.toLocaleDateString(
'en-GB',
{
day:'2-digit',
month:'short',
year:'2-digit'
}
);

}

/* SEARCH */

function searchPLU(inputManual=null){

const input =
(inputManual ||
document.getElementById("searchInput")
.value.trim())
.replace(/\s+/g,'');

const resultDiv =
document.getElementById("result");

if(!input){

playSound("error");

return;

}

totalSearch++;

document.getElementById("searchCount").innerText =
totalSearch;

const result = dataExcel.find(row =>

String(row.PLU).replace(/\s+/g,'') == input ||
String(row.BARCODE).replace(/\s+/g,'') == input

);

if(result){

playSound("success");

speak("Data ditemukan");

resultDiv.innerHTML =

createBox("PLU",result.PLU) +
createBox("DESKRIPSI",result.DESC) +
createBox("SUPCO",result.SUPCO) +
createBox("SUPPLIER",result.NAMA_SUPPLIER) +
createBox("KDSB",result.KDSB) +
createBox("TAG",result.TAG) +
createBox("PTAG",formatTanggal(result.PTAG)) +
createBox("BARCODE",result.BARCODE) +
createBox("STATUS",result.BRG_AKTIF) +
createBox("COVERAGE",result.COVERAGE) +
createBox("TABLOK",result.TABLOK) +
createBox("LPP 01",result.LPP_01_DCI) +
createBox("LPP 02",result.LPP_02_DCI) +
createBox("LPP 03",result.LPP_03_DCI);

}else{

playSound("error");

speak("Data tidak ditemukan");

resultDiv.innerHTML = `

<div class="data-box">

<div class="data-label">
HASIL
</div>

<div class="data-value">
❌ Data tidak ditemukan
</div>

</div>

`;

}

}

/* SCANNER */

function startScanner(){

playSound("scan");

const html5QrCode =
new Html5Qrcode("reader");

html5QrCode.start(

{ facingMode:"environment" },

{
fps:10,
qrbox:200
},

(decodedText)=>{

playSound("success");

document.getElementById("searchInput").value =
decodedText;

html5QrCode.stop();

document.getElementById("reader").innerHTML = "";

searchPLU(decodedText);

},

(errorMessage)=>{}

).catch(err=>{

playSound("error");

});

}

/* VOICE */

let recognition;

function startVoiceInput(){

if(!('webkitSpeechRecognition' in window)){

alert("Browser tidak mendukung voice search");

return;

}

recognition =
new webkitSpeechRecognition();

recognition.lang = "id-ID";

recognition.onresult = function(event){

let text =
event.results[0][0].transcript;

text = text
.replace(/\s+/g,'')
.toUpperCase();

document.getElementById("searchInput").value =
text;

searchPLU(text);

};

recognition.start();

}

/* ENTER */

document
.getElementById("searchInput")
.addEventListener("keypress",function(e){

if(e.key === "Enter"){

searchPLU();

}

});

</script>

</body>

</html>
